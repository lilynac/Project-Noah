name: smoke-linux

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Smoke run (headless)
        run: |
          . .venv/bin/activate
          NOAH_NO_DIALOG=1 timeout 8s python -m src || true

  smoke-windows:
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m venv .venv
          .\.venv\Scripts\Activate.ps1
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Smoke run (headless)
        shell: pwsh
        run: |
          $env:NOAH_NO_DIALOG = "1"
          $p = Start-Process -FilePath python -ArgumentList "-m","src" -PassThru
          Start-Sleep -Seconds 8
          if (!$p.HasExited) { Stop-Process -Id $p.Id -Force }
          exit 0
